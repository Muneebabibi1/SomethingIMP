<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ahmad!</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  body {
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  #message {
    position: absolute;
    top: 15%;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 2rem;
    font-weight: bold;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
    padding: 0 10px;
  }

  #btn {
    position: absolute;
    padding: 20px 40px;
    font-size: 1.3rem;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    background: #ff6b6b;
    color: white;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    transition: transform 0.2s ease, background 0.3s ease;
    z-index: 5;
  }

  #btn:hover {
    transform: scale(1.05);
  }

  #btn.success {
    background: #2ecc71;
    cursor: default;
  }

  .confetti {
    position: absolute;
    top: -10px;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: fall linear forwards;
    z-index: 1;
  }

  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(360deg);
      opacity: 0.7;
    }
  }

  #celebration {
    display: none;
    text-align: center;
    color: white;
    max-width: 90%;
    z-index: 2;
    padding: 20px;
  }

  #celebration h1 {
    font-size: 3rem;
    text-shadow: 3px 3px 10px rgba(0,0,0,0.4);
    margin-bottom: 10px;
  }

  #celebration p {
    font-size: 1.3rem;
    opacity: 0.95;
    margin-bottom: 20px;
  }

  .photo-wrap {
    position: relative;
    display: inline-block;
    margin: 15px auto;
  }

  #ahmadPhoto {
    width: 260px;
    max-width: 70vw;
    border-radius: 20px;
    border: 6px solid #feca57;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: wiggle 1.8s ease-in-out infinite;
    display: block;
  }

  @keyframes wiggle {
    0%, 100% { transform: rotate(-3deg) scale(1); }
    25% { transform: rotate(2deg) scale(1.03); }
    50% { transform: rotate(-2deg) scale(1); }
    75% { transform: rotate(3deg) scale(1.02); }
  }

  .sparkle {
    position: absolute;
    font-size: 2rem;
    animation: sparkleSpin 1.5s linear infinite;
    pointer-events: none;
  }

  .sparkle.s1 { top: -25px; left: -25px; animation-delay: 0s; }
  .sparkle.s2 { top: -25px; right: -25px; animation-delay: 0.3s; }
  .sparkle.s3 { bottom: -25px; left: -25px; animation-delay: 0.6s; }
  .sparkle.s4 { bottom: -25px; right: -25px; animation-delay: 0.9s; }

  @keyframes sparkleSpin {
    0% { transform: rotate(0deg) scale(1); opacity: 1; }
    50% { transform: rotate(180deg) scale(1.3); opacity: 0.6; }
    100% { transform: rotate(360deg) scale(1); opacity: 1; }
  }

  #joke {
    font-size: 1.15rem;
    line-height: 1.6;
    margin: 20px auto 15px;
    max-width: 480px;
    background: rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 18px 22px;
    backdrop-filter: blur(4px);
  }

  #speakBtn {
    padding: 12px 28px;
    font-size: 1rem;
    font-weight: bold;
    border: none;
    border-radius: 30px;
    background: #feca57;
    color: #333;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    transition: transform 0.2s ease;
  }

  #speakBtn:hover {
    transform: scale(1.05);
  }

  #speakBtn:active {
    transform: scale(0.97);
  }

  @media (max-width: 600px) {
    #message { font-size: 1.4rem; }
    #btn { padding: 15px 28px; font-size: 1rem; }
    #celebration h1 { font-size: 2rem; }
    #celebration p { font-size: 1.05rem; }
    #ahmadPhoto { width: 200px; }
    #joke { font-size: 1rem; padding: 14px 16px; }
  }
</style>
</head>

    </div>

    <div id="joke">
      Just a friendly reminder 😄:<br>
      "Life is like a D**k — sometimes it's hard, sometimes it's not,
      sometimes it's up, sometimes it's down... and it's also short." 😂
    </div>

    <br>
    <button id="speakBtn">🔊 Hear it out loud</button>
  </div>

<script>
  const btn = document.getElementById('btn');
  const message = document.getElementById('message');
  const celebration = document.getElementById('celebration');
  const speakBtn = document.getElementById('speakBtn');

  // How many times the button should "run away" before allowing success
  const totalDodges = 4; // adjust between 3-4 here
  let clickCount = 0;

  const phrases = [
    "Try again!",
    "Almost... not quite!",
    "Nope, try again!",
    "So close! One more try..."
  ];

  function placeButtonCenterFirst() {
    btn.style.left = '50%';
    btn.style.top = '50%';
    btn.style.transform = 'translate(-50%, -50%)';
  }

  function moveButtonRandomly() {
    const padding = 80;
    const btnWidth = btn.offsetWidth;
    const btnHeight = btn.offsetHeight;

    const maxX = window.innerWidth - btnWidth - padding;
    const maxY = window.innerHeight - btnHeight - padding;

    const randX = Math.random() * maxX + padding / 2;
    const randY = Math.random() * maxY + padding / 2;

    btn.style.transform = 'none';
    btn.style.left = randX + 'px';
    btn.style.top = randY + 'px';
  }

  function launchConfetti() {
    const colors = ['#ff6b6b', '#feca57', '#1dd1a1', '#54a0ff', '#5f27cd', '#ff9ff3'];
    const confettiCount = 80;

    for (let i = 0; i < confettiCount; i++) {
      const conf = document.createElement('div');
      conf.classList.add('confetti');
      conf.style.left = Math.random() * 100 + 'vw';
      conf.style.background = colors[Math.floor(Math.random() * colors.length)];
      conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
      conf.style.opacity = Math.random();
      document.body.appendChild(conf);

      setTimeout(() => conf.remove(), 4500);
    }
  }

  function speakJoke() {
    if (!('speechSynthesis' in window)) {
      alert("Sorry, your browser doesn't support text-to-speech!");
      return;
    }

    const text = "Just a friendly reminder. Life is like a certain body part... sometimes it's hard, sometimes it's not, sometimes it's up, sometimes it's down, and it's also short!";
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.95;
    utterance.pitch = 1.05;

    // cancel anything currently speaking, then speak
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
  }

  placeButtonCenterFirst();

  btn.addEventListener('click', () => {
    clickCount++;

    if (clickCount <= totalDodges) {
      moveButtonRandomly();
      const phraseIndex = (clickCount - 1) % phrases.length;
      message.textContent = phrases[phraseIndex] + " 😄";
    }

    if (clickCount > totalDodges) {
      btn.classList.add('success');
      btn.textContent = "🎉";
      btn.style.left = '50%';
      btn.style.top = '50%';
      btn.style.transform = 'translate(-50%, -50%)';

      message.style.display = 'none';
      btn.style.display = 'none';

      celebration.style.display = 'block';
      launchConfetti();

      // Speak the joke automatically once it's revealed
      setTimeout(speakJoke, 600);

      btn.replaceWith(btn.cloneNode(true));
    }
  });

  speakBtn.addEventListener('click', speakJoke);

  window.addEventListener('resize', () => {
    if (clickCount === 0) {
      placeButtonCenterFirst();
    }
  });
</script>
